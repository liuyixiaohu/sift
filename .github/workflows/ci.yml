name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / format / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify bundled output is up-to-date with source
        # Source changes require committing the rebuilt bundle. This guard
        # catches forgotten rebuilds before they ship.
        run: |
          if ! git diff --quiet -- '*.js'; then
            echo "::error::Bundled JS files are out of date with src/. Run 'npm run build' and commit the diff."
            git diff -- '*.js'
            exit 1
          fi
